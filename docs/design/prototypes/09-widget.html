<!--
  Folio v3.0 — Widget Design

  Widget 是品牌心智的占领。
  用户每天看 100 次锁屏，每次都被提醒：我的知识库在增长。
  不是功能入口，是一行安静的洞察。

  4 种 Widget：
  1. 锁屏小 — 一行洞察 + Folio 图标
  2. 锁屏中 — 洞察 + 来源标题
  3. 主屏小 — Echo 问题预览
  4. 主屏中 — Echo + 本月统计
-->
<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Widgets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=LXGW+WenKai+TC:wght@300;400;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#FAF9F6;--text-1:#1D1D1F;--text-2:#6E6E73;--text-3:#AEAEB2;--text-4:#D1D1D6;
  --accent:#0071E3;--sep:rgba(0,0,0,.05);--subtle-bg:rgba(0,0,0,.02);
  --success:#248A3D;
  --ui:"Inter","Noto Sans SC",system-ui,sans-serif;
  --serif:"LXGW WenKai TC",serif;
  --quick:0.22s ease;--ink:0.15s ease-out;
  --settle:0.4s cubic-bezier(0.34,1.56,0.64,1);
  --glass:rgba(255,255,255,.55);--glass-border:rgba(255,255,255,.3);
}
[data-theme="dark"]{
  --bg:#000;--text-1:#F5F5F7;--text-2:#86868B;--text-3:#48484A;--text-4:#2C2C2E;
  --accent:#2997FF;--sep:rgba(255,255,255,.05);--subtle-bg:rgba(255,255,255,.03);
  --success:#30D158;
  --glass:rgba(30,30,30,.65);--glass-border:rgba(255,255,255,.08);
}

body{font-family:var(--ui);background:#E8E8ED;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 20px 32px;-webkit-font-smoothing:antialiased}
[data-theme="dark"] body{background:#1C1C1E}

/* ── Phone ── */
.phone{width:393px;height:852px;border-radius:47px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 .5px rgba(0,0,0,.1),0 40px 100px rgba(0,0,0,.08)}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:24px;z-index:100}

/* ── Lock screen bg ── */
.lockscreen{
  flex:1;position:relative;
  background:linear-gradient(145deg,#2C3E50 0%,#1a1a2e 40%,#16213e 100%);
  display:flex;flex-direction:column;
}
[data-theme="dark"] .lockscreen{
  background:linear-gradient(145deg,#0a0a0a 0%,#111 40%,#0a0a15 100%);
}

/* Lock status bar */
.lock-status{height:59px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:#fff;z-index:90;flex-shrink:0}
.lock-status-r{display:flex;align-items:center;gap:5px}

/* Lock time */
.lock-time{text-align:center;padding:40px 0 8px;flex-shrink:0}
.lock-hour{font-size:76px;font-weight:700;color:#fff;line-height:1;letter-spacing:-2px}
.lock-date{font-size:17px;color:rgba(255,255,255,.6);margin-top:4px}

/* Section labels */
.widget-section{padding:24px 20px 12px;flex-shrink:0}
.widget-section-h{font-size:11px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase}

/* ── Lock Screen Widgets ── */
.lock-widgets{padding:0 20px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}

/* Lock small */
.lw-small{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:16px;
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:.5px solid var(--glass-border);
}
.lw-small-icon{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;color:rgba(255,255,255,.7);
}
.lw-small-text{
  font-size:13px;color:#fff;line-height:1.4;flex:1;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}

/* Lock medium */
.lw-medium{
  padding:12px 14px;border-radius:16px;
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:.5px solid var(--glass-border);
}
.lw-medium-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.lw-medium-icon{
  width:20px;height:20px;border-radius:5px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:rgba(255,255,255,.7);flex-shrink:0;
}
.lw-medium-app{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:.3px}
.lw-medium-text{font-size:14px;color:#fff;line-height:1.5;margin-bottom:4px}
.lw-medium-sub{font-size:12px;color:rgba(255,255,255,.4)}

/* ── Home Screen section ── */
.homescreen{
  flex:1;position:relative;
  background:var(--bg);
  display:flex;flex-direction:column;
  border-top-left-radius:0;border-top-right-radius:0;
}

.home-section{padding:20px 20px 12px}
.home-section-h{font-size:11px;font-weight:600;color:var(--text-4);letter-spacing:1.5px;text-transform:uppercase}

.home-widgets{padding:0 20px;display:flex;gap:10px;flex-wrap:wrap}

/* Home small (square) */
.hw-small{
  width:170px;height:170px;padding:14px;border-radius:20px;
  background:var(--subtle-bg);
  display:flex;flex-direction:column;justify-content:space-between;
  border:.5px solid var(--sep);
}
.hw-small-header{display:flex;align-items:center;gap:6px}
.hw-small-icon{
  width:24px;height:24px;border-radius:6px;
  background:var(--text-1);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--bg);flex-shrink:0;font-weight:700;
}
.hw-small-app{font-size:11px;color:var(--text-3);font-weight:500}
.hw-small-body{flex:1;display:flex;align-items:center}
.hw-small-q{font-family:var(--serif);font-size:14px;color:var(--text-1);line-height:1.5}
.hw-small-footer{font-size:11px;color:var(--text-4)}

/* Home medium (wide) */
.hw-medium{
  width:100%;padding:14px 16px;border-radius:20px;
  background:var(--subtle-bg);
  border:.5px solid var(--sep);
}
.hw-medium-header{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.hw-medium-icon{
  width:24px;height:24px;border-radius:6px;
  background:var(--text-1);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--bg);flex-shrink:0;font-weight:700;
}
.hw-medium-app{font-size:11px;color:var(--text-3);font-weight:500}
.hw-medium-body{display:flex;gap:14px;align-items:center}
.hw-medium-left{flex:1}
.hw-medium-q{font-family:var(--serif);font-size:14px;color:var(--text-1);line-height:1.5;margin-bottom:6px}
.hw-medium-hint{font-size:11px;color:var(--text-4)}
.hw-medium-right{flex-shrink:0;text-align:center}
.hw-medium-ring{position:relative;width:56px;height:56px}
.hw-medium-ring svg{transform:rotate(-90deg)}
.hw-ring-bg{stroke:var(--sep);fill:none;stroke-width:5}
.hw-ring-fill{fill:none;stroke-width:5;stroke-linecap:round}
.hw-medium-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hw-medium-pct-num{font-size:14px;font-weight:700;color:var(--text-1);line-height:1}
.hw-medium-pct-label{font-size:8px;color:var(--text-4);margin-top:1px}

/* Divider between lock and home */
.screen-divider{
  height:48px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(var(--bg),var(--bg));flex-shrink:0;
  border-top:.5px solid var(--sep);
}
.screen-divider span{font-size:11px;color:var(--text-4);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}

.home-i{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--text-1);opacity:.12;border-radius:3px;z-index:60}
button{min-height:44px}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>

<div class="phone">
  <div class="island"></div>

  <!-- Lock Screen -->
  <div class="lockscreen">
    <div class="lock-status">
      <span style="opacity:0">9:41</span>
      <div class="lock-status-r">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor" opacity=".7"><rect x="0" y="3" width="3" height="8" rx=".8" opacity=".4"/><rect x="4.5" y="2" width="3" height="9" rx=".8" opacity=".6"/><rect x="9" y=".5" width="3" height="10.5" rx=".8" opacity=".8"/><rect x="13.5" y="0" width="2.5" height="11" rx=".8"/></svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor" opacity=".7"><path d="M7.5 3.2c-1.6 0-3 .6-4.1 1.6l1.3 1.3c.7-.7 1.7-1.1 2.8-1.1s2.1.4 2.8 1.1l1.3-1.3c-1.1-1-2.5-1.6-4.1-1.6z"/><circle cx="7.5" cy="9" r="1.2"/></svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="currentColor" opacity=".7"><rect x="0" y=".5" width="21" height="10" rx="2.2" stroke="currentColor" stroke-width="1" fill="none" opacity=".35"/><rect x="22" y="3" width="1.8" height="5" rx=".9" opacity=".2"/><rect x="2" y="2.5" width="15" height="6" rx="1.2"/></svg>
      </div>
    </div>

    <div class="lock-time">
      <div class="lock-hour">9:41</div>
      <div class="lock-date">3月22日 星期六</div>
    </div>

    <div class="widget-section"><div class="widget-section-h">锁屏 Widget</div></div>

    <div class="lock-widgets">
      <!-- Lock small -->
      <div class="lw-small">
        <div class="lw-small-icon">F</div>
        <div class="lw-small-text">好的 API 设计像好的笑话——不需要解释</div>
      </div>

      <!-- Lock medium -->
      <div class="lw-medium">
        <div class="lw-medium-header">
          <div class="lw-medium-icon">F</div>
          <span class="lw-medium-app">FOLIO</span>
        </div>
        <div class="lw-medium-text">失败的根因不是技术，而是问题定义错误——团队在用 AI 解决不需要 AI 的问题。</div>
        <div class="lw-medium-sub">来自《为什么 90% 的 AI 项目失败了》</div>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="screen-divider"><span>主屏 Widget</span></div>

  <!-- Home Screen Widgets -->
  <div class="homescreen">
    <div class="home-widgets" style="padding-top:16px">

      <!-- Home small -->
      <div class="hw-small">
        <div class="hw-small-header">
          <div class="hw-small-icon">F</div>
          <span class="hw-small-app">Echo</span>
        </div>
        <div class="hw-small-body">
          <div class="hw-small-q">还记得 AI 项目失败最反直觉的结论吗？</div>
        </div>
        <div class="hw-small-footer">点击回忆</div>
      </div>

      <!-- Home small variant -->
      <div class="hw-small">
        <div class="hw-small-header">
          <div class="hw-small-icon">F</div>
          <span class="hw-small-app">今日</span>
        </div>
        <div class="hw-small-body" style="flex-direction:column;align-items:center;justify-content:center;gap:4px">
          <div style="font-size:32px;font-weight:700;color:var(--text-1);line-height:1">47</div>
          <div style="font-size:12px;color:var(--text-3)">篇收藏</div>
        </div>
        <div class="hw-small-footer">本月 · 85% 回忆率</div>
      </div>

      <!-- Home medium -->
      <div class="hw-medium">
        <div class="hw-medium-header">
          <div class="hw-medium-icon">F</div>
          <span class="hw-medium-app">Echo · 今日回忆</span>
        </div>
        <div class="hw-medium-body">
          <div class="hw-medium-left">
            <div class="hw-medium-q">你标注过一句关于 API 设计的话。还记得原文吗？</div>
            <div class="hw-medium-hint">点击回忆 · 10 秒</div>
          </div>
          <div class="hw-medium-right">
            <div class="hw-medium-ring">
              <svg width="56" height="56" viewBox="0 0 56 56">
                <circle class="hw-ring-bg" cx="28" cy="28" r="23"/>
                <circle class="hw-ring-fill" cx="28" cy="28" r="23" stroke="var(--success)" stroke-dasharray="144.5" stroke-dashoffset="21.7"/>
              </svg>
              <div class="hw-medium-pct">
                <div class="hw-medium-pct-num">85%</div>
                <div class="hw-medium-pct-label">回忆率</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="home-i"></div>
</div>

<script>
document.addEventListener('keydown',e=>{
  if(e.key==='d'||e.key==='D'){
    const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',t);
  }
});
if(window.matchMedia('(prefers-color-scheme:dark)').matches)
  document.documentElement.setAttribute('data-theme','dark');
</script>
</body>
</html>
