<!--
  Folio v3.0 — Knowledge Map (知识地图)

  你的阅读不是消费，是建设。
  知识地图让你看到自己的知识版图正在如何生长。
  每一篇收藏都不是孤立的——它们在连接、在积累。

  内容：
  1. 月度概览数字（收藏/洞察/连续天数）
  2. 主题分布条形图
  3. AI 趋势洞察
  4. Echo 吸收统计
-->
<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Knowledge Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=LXGW+WenKai+TC:wght@300;400;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#FAF9F6;--text-1:#1D1D1F;--text-2:#6E6E73;--text-3:#AEAEB2;--text-4:#D1D1D6;
  --accent:#0071E3;--accent-soft:rgba(0,113,227,.08);--sep:rgba(0,0,0,.05);
  --success:#248A3D;--subtle-bg:rgba(0,0,0,.02);
  --ui:"Inter","Noto Sans SC",system-ui,sans-serif;
  --serif:"LXGW WenKai TC",serif;
  --settle:0.4s cubic-bezier(0.34,1.56,0.64,1);--quick:0.22s ease;--ink:0.15s ease-out;
}
[data-theme="dark"]{
  --bg:#000;--text-1:#F5F5F7;--text-2:#86868B;--text-3:#48484A;--text-4:#2C2C2E;
  --accent:#2997FF;--accent-soft:rgba(41,151,255,.1);--sep:rgba(255,255,255,.05);
  --success:#30D158;--subtle-bg:rgba(255,255,255,.03);
}

body{font-family:var(--ui);background:#E8E8ED;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 20px 32px;-webkit-font-smoothing:antialiased}
[data-theme="dark"] body{background:#1C1C1E}

.phone{width:393px;height:852px;background:var(--bg);border-radius:47px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 .5px rgba(0,0,0,.1),0 40px 100px rgba(0,0,0,.08);transition:background var(--quick)}
[data-theme="dark"] .phone{box-shadow:0 0 0 .5px rgba(255,255,255,.08),0 40px 100px rgba(0,0,0,.5)}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:24px;z-index:100}
.statusbar{height:59px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:var(--text-1);z-index:90}
.statusbar-r{display:flex;align-items:center;gap:5px}

/* Nav */
.nav{padding:6px 16px 0;display:flex;align-items:center;gap:4px}
.nav-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;background:none;color:var(--accent);border-radius:50%}
.nav-btn:active{opacity:.4}
.nav-back-label{font-size:16px;color:var(--accent);margin-left:-4px}

/* Scroll */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:44px}
.scroll::-webkit-scrollbar{display:none}

/* Header */
.map-header{padding:24px 20px 8px}
.map-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--text-1);margin-bottom:4px}
.map-sub{font-size:13px;color:var(--text-3)}

/* Stats row */
.stats{display:flex;gap:0;padding:24px 20px 20px}
.stat{flex:1;text-align:center;position:relative}
.stat+.stat::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:.5px;background:var(--sep)}
.stat-num{font-size:32px;font-weight:700;color:var(--text-1);line-height:1.1;margin-bottom:4px;letter-spacing:-1px}
.stat-label{font-size:12px;color:var(--text-3)}

/* Section */
.section{padding:0 20px;margin-top:28px}
.section-h{font-size:11px;font-weight:600;color:var(--text-4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.bar-label{font-size:14px;color:var(--text-2);width:56px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--subtle-bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.25,.1,.25,1)}
.bar-count{font-size:12px;color:var(--text-3);width:28px;flex-shrink:0}

/* Colors for bars */
.bar-fill.c0{background:var(--text-1)}
.bar-fill.c1{background:var(--text-2)}
.bar-fill.c2{background:var(--text-3)}
.bar-fill.c3{background:var(--text-4)}
.bar-fill.c4{background:var(--sep)}

/* Trend insight */
.trend{
  margin:28px 20px 0;padding:20px;background:var(--subtle-bg);border-radius:14px;
}
.trend-label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-weight:500;margin-bottom:12px}
.trend-text{font-family:var(--serif);font-size:16px;color:var(--text-1);line-height:1.65}

/* Echo stats */
.echo-stats{margin:28px 20px 0;padding:20px;background:var(--subtle-bg);border-radius:14px}
.echo-stats-h{font-size:13px;color:var(--text-2);margin-bottom:16px}

.echo-ring-wrap{display:flex;align-items:center;gap:20px}
.echo-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.echo-ring svg{transform:rotate(-90deg)}
.echo-ring-bg{stroke:var(--sep);fill:none;stroke-width:6}
.echo-ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.echo-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text-1)}

.echo-detail{flex:1}
.echo-detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
.echo-detail-row+.echo-detail-row{border-top:.5px solid var(--sep)}
.echo-detail-label{color:var(--text-2)}
.echo-detail-val{font-weight:600;color:var(--text-1)}

/* Monthly note */
.monthly-note{
  margin:28px 20px 20px;padding:16px;text-align:center;
  font-size:13px;color:var(--text-4);line-height:1.5;
}

.home-i{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--text-1);opacity:.12;border-radius:3px}

#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--text-1);color:var(--bg);padding:10px 28px;border-radius:24px;font-size:14px;font-family:var(--ui);font-weight:500;opacity:0;pointer-events:none;transition:opacity var(--ink);z-index:300}
button{min-height:44px}
</style>
</head>
<body>

<div class="phone">
  <div class="island"></div>
  <div class="statusbar">
    <span>9:41</span>
    <div class="statusbar-r">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="3" width="3" height="8" rx=".8" opacity=".4"/><rect x="4.5" y="2" width="3" height="9" rx=".8" opacity=".6"/><rect x="9" y=".5" width="3" height="10.5" rx=".8" opacity=".8"/><rect x="13.5" y="0" width="2.5" height="11" rx=".8"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><path d="M7.5 3.2c-1.6 0-3 .6-4.1 1.6l1.3 1.3c.7-.7 1.7-1.1 2.8-1.1s2.1.4 2.8 1.1l1.3-1.3c-1.1-1-2.5-1.6-4.1-1.6z"/><circle cx="7.5" cy="9" r="1.2"/><path d="M7.5 0C4.9 0 2.5 1 .7 2.7l1.3 1.3C3.5 2.5 5.4 1.7 7.5 1.7S11.5 2.5 13 4l1.3-1.3C12.5 1 10.1 0 7.5 0z" opacity=".5"/></svg>
      <svg width="25" height="11" viewBox="0 0 25 11" fill="currentColor"><rect x="0" y=".5" width="21" height="10" rx="2.2" stroke="currentColor" stroke-width="1" fill="none" opacity=".35"/><rect x="22" y="3" width="1.8" height="5" rx=".9" opacity=".2"/><rect x="2" y="2.5" width="15" height="6" rx="1.2"/></svg>
    </div>
  </div>

  <div class="nav">
    <div style="display:flex;align-items:center;gap:4px">
      <button class="nav-btn" onclick="window.location.href='01-home-feed.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="nav-back-label">页集</span>
    </div>
  </div>

  <div class="scroll">

    <div class="map-header">
      <div class="map-title">知识地图</div>
      <div class="map-sub">2026 年 3 月</div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num">47</div>
        <div class="stat-label">篇收藏</div>
      </div>
      <div class="stat">
        <div class="stat-num">31</div>
        <div class="stat-label">个洞察</div>
      </div>
      <div class="stat">
        <div class="stat-num">7</div>
        <div class="stat-label">天连续</div>
      </div>
    </div>

    <!-- Topic distribution -->
    <div class="section">
      <div class="section-h">主题分布</div>
      <div class="bar-row"><div class="bar-label">AI</div><div class="bar-track"><div class="bar-fill c0" style="width:90%"></div></div><div class="bar-count">14</div></div>
      <div class="bar-row"><div class="bar-label">产品</div><div class="bar-track"><div class="bar-fill c1" style="width:60%"></div></div><div class="bar-count">9</div></div>
      <div class="bar-row"><div class="bar-label">商业</div><div class="bar-track"><div class="bar-fill c1" style="width:45%"></div></div><div class="bar-count">7</div></div>
      <div class="bar-row"><div class="bar-label">设计</div><div class="bar-track"><div class="bar-fill c2" style="width:35%"></div></div><div class="bar-count">5</div></div>
      <div class="bar-row"><div class="bar-label">创业</div><div class="bar-track"><div class="bar-fill c2" style="width:30%"></div></div><div class="bar-count">5</div></div>
      <div class="bar-row"><div class="bar-label">技术</div><div class="bar-track"><div class="bar-fill c3" style="width:22%"></div></div><div class="bar-count">4</div></div>
      <div class="bar-row"><div class="bar-label">文化</div><div class="bar-track"><div class="bar-fill c3" style="width:15%"></div></div><div class="bar-count">2</div></div>
      <div class="bar-row"><div class="bar-label">效率</div><div class="bar-track"><div class="bar-fill c4" style="width:8%"></div></div><div class="bar-count">1</div></div>
    </div>

    <!-- Trend insight -->
    <div class="trend">
      <div class="trend-label">✦ 趋势洞察</div>
      <div class="trend-text">你的关注重心正在从「AI 技术」转向「AI 产品化」——本月产品类收藏增长了 80%，而纯技术类持平。</div>
    </div>

    <!-- Echo absorption -->
    <div class="echo-stats">
      <div class="echo-stats-h">Echo 吸收统计</div>
      <div class="echo-ring-wrap">
        <div class="echo-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="echo-ring-bg" cx="40" cy="40" r="34"/>
            <circle class="echo-ring-fill" cx="40" cy="40" r="34"
              stroke="var(--success)"
              stroke-dasharray="213.6"
              stroke-dashoffset="32"/>
          </svg>
          <div class="echo-ring-pct">85%</div>
        </div>
        <div class="echo-detail">
          <div class="echo-detail-row">
            <span class="echo-detail-label">本月 Echo</span>
            <span class="echo-detail-val">23 次</span>
          </div>
          <div class="echo-detail-row">
            <span class="echo-detail-label">记得</span>
            <span class="echo-detail-val" style="color:var(--success)">20</span>
          </div>
          <div class="echo-detail-row">
            <span class="echo-detail-label">忘了</span>
            <span class="echo-detail-val">3</span>
          </div>
        </div>
      </div>
    </div>

    <div class="monthly-note">知识在积累，你正在变得更强。</div>

  </div>

  <div class="home-i"></div>
</div>

<div id="toast"></div>

<script>
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',1200);
}
document.addEventListener('keydown',e=>{
  if(e.key==='d'||e.key==='D'){
    const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',t);
  }
});
if(window.matchMedia('(prefers-color-scheme:dark)').matches)
  document.documentElement.setAttribute('data-theme','dark');
</script>
</body>
</html>
